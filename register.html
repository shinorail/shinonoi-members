<!DOCTYPE html>
<html lang="ja">
<head>

    <title>会員登録</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="header">
    <img src="assets/img/logo.png" class="logo">
    <button class="hamburger" id="hamburgerBtn">☰</button>
    <nav id="navMenu">
        <a href="index.html">ホーム</a>

<main class="form-box">
    <h2>会員登録</h2>
    <form id="registerForm">
        <input type="text" id="regName" placeholder="ユーザー名" required>
        <input type="text" id="regId" placeholder="希望するユーザーID" required>
        <input type="password" id="regPw" placeholder="パスワード" required>
        <button class="btn" type="submit">登録する</button>
    </form>
    <p id="registerMsg"></p>
</main>

<script src="assets/js/app.js"></script>
</body>
