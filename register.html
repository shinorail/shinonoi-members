<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>会員登録</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="header">
    <img src="assets/img/logo.png" class="logo">
    <button class="hamburger" id="hamburgerBtn">☰</button>
    <nav id="navMenu">
        <a href="index.html">ホーム</a>
        <a href="login.html">ログイン</a>
        <a href="register.html">会員登録</a>
        <a href="members.html">会員ページ</a>
    </nav>
</header>

<main class="form-box">
    <h2>会員登録</h2>
    <form id="registerForm">
        <input type="text" id="regName" placeholder="ユーザー名" required>
        <input type="text" id="regId" placeholder="ユーザーID" required>
        <input type="password" id="regPw" placeholder="パスワード" required>
        <button class="btn" type="submit">登録する</button>
    </form>

    <div id="registerMsg" class="alert hidden">
        <span class="alert-title">登録完了</span>
        <span class="alert-text">ログインページからログインしてください。</span>
    </div>
</main>

<script src="assets/js/app.js"></script>
</body>
</html>
