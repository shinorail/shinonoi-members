<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>新規登録</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<section class="form-box">
    <h2>新規登録</h2>

    <form id="registerForm">
        <input type="text" id="newUser" placeholder="ユーザー名" required>
        <input type="password" id="newPass" placeholder="パスワード" required>
        <button class="btn" type="submit">登録する</button>
    </form>

    <p id="registerMsg"></p>
</section>

<script src="assets/js/auth.js"></script>
</body>
</html>
