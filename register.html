<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>会員登録 | Shinonoi Members</title>
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body>
  <div class="register-container">
    <h1>新規登録</h1>
    <form id="registerForm">
      <label for="regId">メールアドレス</label>
      <input type="email" id="regId" required />

      <label for="regPw">パスワード</label>
      <input type="password" id="regPw" required />

      <button type="submit">登録する</button>
    </form>
  </div>

  <!-- Firebase登録処理 -->
  <script type="module">
    import { auth, createUserWithEmailAndPassword } from "./firebase.js";

    const registerForm = document.getElementById("registerForm");

    registerForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("regId").value;
      const password = document.getElementById("regPw").value;

      try {
        await createUserWithEmailAndPassword(auth, email, password);
        alert("登録完了！ログインページへ進んでください。");
        window.location.href = "login.html";
      } catch (error) {
        alert("登録エラー: " + error.message);
      }
    });
  </script>
</body>
</html>
