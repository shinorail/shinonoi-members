<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ログイン</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<header class="header">
    <img src="assets/img/logo.png" class="logo">
    <button class="hamburger" id="hamburgerBtn">☰</button>
    <nav id="navMenu">
        <a href="index.html">ホーム</a>
        <a href="login.html">ログイン</a>
        <a href="register.html">会員登録</a>
        <a href="members.html">会員ページ</a>
    </nav>
</header>

<main class="form-box">
    <h2>ログイン</h2>
    <form id="loginForm">
        <input type="text" id="loginId" placeholder="ユーザーID" required>
        <input type="password" id="loginPw" placeholder="パスワード" required>
        <button class="btn" type="submit">ログイン</button>
    </form>

    <div id="loginError" class="alert hidden">
        <span class="alert-title">ログインに失敗しました</span>
        <span class="alert-text">IDまたはパスワードが違います。</span>
    </div>
</main>

<script src="assets/js/app.js"></script>
</body>
</html>
